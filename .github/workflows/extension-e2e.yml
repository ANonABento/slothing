name: Columbus Extension E2E Tests

on:
  push:
    paths:
      - 'columbus-extension/**'
      - '.github/workflows/extension-e2e.yml'
  pull_request:
    paths:
      - 'columbus-extension/**'
      - '.github/workflows/extension-e2e.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: columbus-extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: columbus-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Build extension
        run: npm run build

      # headless: false requires a virtual display on Linux
      - name: Run E2E tests
        run: xvfb-run --auto-servernum -- npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: columbus-extension/playwright-report/
          retention-days: 7
