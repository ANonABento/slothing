name: Columbus Extension E2E Tests

on:
  push:
    paths:
      - "apps/extension/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-e2e.yml"
  pull_request:
    paths:
      - "apps/extension/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium browser
        run: pnpm exec playwright install chromium --with-deps

      - name: Build extension
        run: pnpm run build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum -- pnpm exec playwright test
        env:
          CI: true

      - name: Run Slothing integration E2E
        run: xvfb-run --auto-servernum -- pnpm exec playwright test tests/e2e/slothing-integration.spec.ts
        env:
          CI: true
          SLOTHING_INTEGRATION: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/extension/playwright-report/
          retention-days: 7
