name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect app changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '.github/workflows/ci.yml'
              - 'apps/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'

  quality-gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Type check
            command: pnpm run type-check
          - name: Test
            command: pnpm run test:run
          - name: Lint
            command: pnpm run lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [changes, quality-gates]
    if: always()

    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.quality-gates.result }}" == "failure" || "${{ needs.quality-gates.result }}" == "cancelled" ]]; then
            exit 1
          fi
