name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect app changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '.github/workflows/*.yml'
              - '.github/workflows/*.yaml'
              - 'apps/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'

  quality-gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Type check
            command: pnpm run type-check
          - name: Translation drift
            command: pnpm --filter @slothing/web check:translations:preflight
          - name: Test
            command: pnpm run test:run
          - name: Lint
            command: pnpm run lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from `packageManager` in package.json — do not
        # also pass `version:` here or pnpm/action-setup@v4 errors with
        # ERR_PNPM_BAD_PM_VERSION.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Authenticate GitHub git dependencies
        env:
          BENTO_ROUTER_DEPLOY_KEY: ${{ secrets.BENTO_ROUTER_DEPLOY_KEY }}
          BENTO_ROUTER_READ_TOKEN: ${{ secrets.BENTO_ROUTER_READ_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$BENTO_ROUTER_DEPLOY_KEY" ]]; then
            key_path="${RUNNER_TEMP}/bento-router-deploy-key"
            printf '%s\n' "$BENTO_ROUTER_DEPLOY_KEY" > "$key_path"
            chmod 600 "$key_path"
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            echo "GIT_SSH_COMMAND=ssh -i ${key_path} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "$GITHUB_ENV"
            exit 0
          fi

          token="${BENTO_ROUTER_READ_TOKEN:-$GITHUB_TOKEN}"
          {
            echo "GIT_CONFIG_COUNT=2"
            echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_0=git@github.com:"
            echo "GIT_CONFIG_KEY_1=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_1=https://github.com/"
          } >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  e2e-smoke:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Authenticate GitHub git dependencies
        env:
          BENTO_ROUTER_DEPLOY_KEY: ${{ secrets.BENTO_ROUTER_DEPLOY_KEY }}
          BENTO_ROUTER_READ_TOKEN: ${{ secrets.BENTO_ROUTER_READ_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$BENTO_ROUTER_DEPLOY_KEY" ]]; then
            key_path="${RUNNER_TEMP}/bento-router-deploy-key"
            printf '%s\n' "$BENTO_ROUTER_DEPLOY_KEY" > "$key_path"
            chmod 600 "$key_path"
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            echo "GIT_SSH_COMMAND=ssh -i ${key_path} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "$GITHUB_ENV"
            exit 0
          fi

          token="${BENTO_ROUTER_READ_TOKEN:-$GITHUB_TOKEN}"
          {
            echo "GIT_CONFIG_COUNT=2"
            echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_0=git@github.com:"
            echo "GIT_CONFIG_KEY_1=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_1=https://github.com/"
          } >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"

      - name: Restore dependency and tool caches
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            apps/extension/node_modules
            packages/shared/node_modules
            .next/cache
            node_modules/.vite/vitest
          key: ${{ runner.os }}-node20-ci-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-ci-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @slothing/web exec playwright install --with-deps chromium

      - name: Run smoke e2e
        run: pnpm --filter @slothing/web exec playwright test --project=chromium --grep "@smoke"
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [changes, quality-gates, e2e-smoke]
    if: always()

    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.quality-gates.result }}" == "failure" || "${{ needs.quality-gates.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.e2e-smoke.result }}" == "failure" || "${{ needs.e2e-smoke.result }}" == "cancelled" ]]; then
            exit 1
          fi
