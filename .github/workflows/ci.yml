name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Type-check, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Lint
        run: npm run lint

  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          missing=()
          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Pull Vercel preview environment
        run: npx --yes vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview
        run: npx --yes vercel@latest build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url="$(npx --yes vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Preview deployment: $deployment_url"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-deployment -->';
            const body = `${marker}\nVercel preview deployment: ${process.env.DEPLOYMENT_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}

  deploy-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          missing=()
          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Pull Vercel production environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: |
          deployment_url="$(npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "Production deployment: $deployment_url"
