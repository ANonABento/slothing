name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect app changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '.github/workflows/ci.yml'
              - 'evals/**'
              - 'e2e/**'
              - 'src/**'
              - 'tests/**'
              - '.eslintrc.json'
              - 'audit.playwright.config.ts'
              - 'drizzle.config.ts'
              - 'next.config.mjs'
              - 'next-env.d.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.ts'
              - 'postcss.config.mjs'
              - 'tailwind.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.typecheck.json'
              - 'vitest.config.ts'

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore dependency and tool caches
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            node_modules/.vite/vitest
            .vitest-cache
          key: ${{ runner.os }}-node20-ci-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-ci-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Type check
        run: npm run type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore dependency and tool caches
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            node_modules/.vite/vitest
            .vitest-cache
          key: ${{ runner.os }}-node20-ci-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-ci-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        run: npm run test:run

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Restore dependency and tool caches
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            node_modules/.vite/vitest
            .vitest-cache
          key: ${{ runner.os }}-node20-ci-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-ci-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [changes, type-check, test, lint]
    if: always()

    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.type-check.result }}" == "failure" || "${{ needs.type-check.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            exit 1
          fi

          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.lint.result }}" == "cancelled" ]]; then
            exit 1
          fi
