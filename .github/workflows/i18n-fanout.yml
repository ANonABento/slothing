name: i18n fanout

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/src/messages/en.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/src/messages/en.json'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fanout:
    name: Translate message updates
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '[skip-i18n]') &&
      !contains(github.event.pull_request.title || '', '[skip-i18n]') &&
      !contains(github.event.pull_request.body || '', '[skip-i18n]') &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Authenticate GitHub git dependencies
        env:
          BENTO_ROUTER_DEPLOY_KEY: ${{ secrets.BENTO_ROUTER_DEPLOY_KEY }}
          BENTO_ROUTER_READ_TOKEN: ${{ secrets.BENTO_ROUTER_READ_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$BENTO_ROUTER_DEPLOY_KEY" ]]; then
            key_path="${RUNNER_TEMP}/bento-router-deploy-key"
            printf '%s\n' "$BENTO_ROUTER_DEPLOY_KEY" > "$key_path"
            chmod 600 "$key_path"
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            echo "GIT_SSH_COMMAND=ssh -i ${key_path} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "$GITHUB_ENV"
            exit 0
          fi

          token="${BENTO_ROUTER_READ_TOKEN:-$GITHUB_TOKEN}"
          {
            echo "GIT_CONFIG_COUNT=2"
            echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_0=git@github.com:"
            echo "GIT_CONFIG_KEY_1=url.https://x-access-token:${token}@github.com/.insteadOf"
            echo "GIT_CONFIG_VALUE_1=https://github.com/"
          } >> "$GITHUB_ENV"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${token}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify translation secret
        run: |
          if [[ -z "${ANTHROPIC_API_KEY}" && -z "${OPENAI_API_KEY}" ]]; then
            echo "ANTHROPIC_API_KEY or OPENAI_API_KEY is required for automatic i18n fanout." >&2
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Translate messages
        working-directory: apps/web
        run: pnpm translate:messages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Check for non-English locale changes
        id: diff
        run: |
          changed="$(git diff --name-only -- apps/web/src/messages | grep -v 'apps/web/src/messages/en.json$' || true)"
          if [[ -n "${changed}" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            {
              echo "files<<EOF"
              echo "${changed}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Refresh placeholder audit
        if: steps.diff.outputs.changed == 'true'
        working-directory: apps/web
        run: pnpm check:translations:update-report

      - name: Validate generated catalogs
        if: steps.diff.outputs.changed == 'true'
        working-directory: apps/web
        run: pnpm check:translations:release

      - name: Commit updates to PR branch
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/messages docs/audits/dogfood-2026-05-13/translation-placeholders.md
          git commit -m "chore(i18n): fan out message translations [skip-i18n]"
          git push

      - name: Open fanout PR
        if: github.event_name == 'push' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): fan out message translations [skip-i18n]'
          branch: automation/i18n-fanout
          delete-branch: true
          add-paths: |
            apps/web/src/messages
            docs/audits/dogfood-2026-05-13/translation-placeholders.md
          title: 'chore(i18n): fan out message translations'
          body: |
            `apps/web/src/messages/en.json` changed on `main`.

            This PR was generated by the i18n fanout workflow after running:

            ```sh
            cd apps/web
            pnpm translate:messages
            pnpm check:translations:update-report
            pnpm check:translations:release
            ```
          labels: i18n-fanout
