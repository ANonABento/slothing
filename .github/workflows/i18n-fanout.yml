name: i18n fanout

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/src/messages/en.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/src/messages/en.json'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fanout:
    name: Translate message updates
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message || '', '[skip-i18n]') &&
      !contains(github.event.pull_request.title || '', '[skip-i18n]') &&
      !contains(github.event.pull_request.body || '', '[skip-i18n]') &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from `packageManager` in package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify translation secret
        run: |
          if [[ -z "${ANTHROPIC_API_KEY}" ]]; then
            echo "ANTHROPIC_API_KEY is required for automatic i18n fanout." >&2
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Translate messages
        working-directory: apps/web
        run: pnpm translate:messages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check for non-English locale changes
        id: diff
        run: |
          changed="$(git diff --name-only -- apps/web/src/messages | grep -v 'apps/web/src/messages/en.json$' || true)"
          if [[ -n "${changed}" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            {
              echo "files<<EOF"
              echo "${changed}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate generated catalogs
        if: steps.diff.outputs.changed == 'true'
        working-directory: apps/web
        run: pnpm check:translations

      - name: Commit updates to PR branch
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/messages
          git commit -m "chore(i18n): fan out message translations [skip-i18n]"
          git push

      - name: Open fanout PR
        if: github.event_name == 'push' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): fan out message translations [skip-i18n]'
          branch: automation/i18n-fanout
          delete-branch: true
          title: 'chore(i18n): fan out message translations'
          body: |
            `apps/web/src/messages/en.json` changed on `main`.

            This PR was generated by the i18n fanout workflow after running:

            ```sh
            cd apps/web
            pnpm translate:messages
            pnpm check:translations
            ```
          labels: i18n-fanout
